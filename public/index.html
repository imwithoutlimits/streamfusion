<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StreamFusion" />
  <title>StreamFusion</title>
  <link rel="manifest" href="/manifest.json" />

  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0f;
      --surface:    #12121a;
      --surface2:   #1a1a28;
      --border:     #2a2a40;
      --purple:     #7c3aed;
      --purple-dim: #4c1d95;
      --red:        #ef4444;
      --green:      #22c55e;
      --yellow:     #f59e0b;
      --text:       #f1f5f9;
      --muted:      #64748b;
      --radius:     14px;
      --tiktok:     #ff0050;
      --youtube:    #ff0000;
      --facebook:   #1877f2;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Layout ────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 0 rgba(239,68,68,0.5);
    }

    .logo-dot.pulsing {
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
      70%  { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    .conn-badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      transition: all .3s;
    }

    .conn-badge.connected  { color: var(--green);  border-color: var(--green);  background: rgba(34,197,94,.1); }
    .conn-badge.error      { color: var(--red);    border-color: var(--red);    background: rgba(239,68,68,.1); }

    /* ── Camera Preview ─────────────────────────────────────────── */
    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      max-height: 52vh;
      background: #000;
      overflow: hidden;
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror for selfie feel */
      display: block;
    }

    /* Live timer overlay */
    .live-overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      transition: opacity .3s;
    }

    .live-overlay.visible { opacity: 1; }

    .live-label {
      color: var(--red);
      letter-spacing: 1px;
    }

    #timer { color: white; font-variant-numeric: tabular-nums; }

    /* Camera controls overlay */
    .cam-controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cam-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .1s;
    }

    .cam-btn:active { transform: scale(0.9); }
    .cam-btn.muted  { background: rgba(239,68,68,0.8); }

    /* Placeholder when camera is off */
    .cam-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .cam-placeholder .icon { font-size: 36px; }

    /* ── Main Content ───────────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Platform Cards ─────────────────────────────────────────── */
    .platform-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .3s;
    }

    .platform-card.active-platform { border-color: var(--purple); }

    .platform-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .platform-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .platform-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }

    .platform-icon.tiktok   { background: linear-gradient(135deg, #010101, #ff0050); }
    .platform-icon.youtube  { background: var(--youtube); }
    .platform-icon.facebook { background: var(--facebook); }

    .platform-name {
      font-size: 15px;
      font-weight: 600;
    }

    .platform-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .platform-status.live   { color: var(--green); }
    .platform-status.error  { color: var(--red); }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 13px;
      cursor: pointer;
      transition: background .2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      left: 3px; bottom: 3px;
      background: white;
      transition: transform .2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--purple); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Key input area */
    .platform-body {
      display: none;
      padding: 0 14px 14px;
      flex-direction: column;
      gap: 8px;
    }

    .platform-body.open { display: flex; }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    .key-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Courier New', monospace;
      outline: none;
      transition: border-color .2s;
      min-width: 0;
    }

    .key-input:focus { border-color: var(--purple); }
    .key-input::placeholder { color: var(--muted); font-size: 12px; }

    .reveal-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color .2s;
    }

    .reveal-btn:active { color: var(--text); }

    /* ── Go Live Button ──────────────────────────────────────────── */
    .go-live-wrap {
      padding: 0 0 4px;
    }

    #goLiveBtn {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all .2s;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }

    #goLiveBtn:active  { transform: scale(0.98); }
    #goLiveBtn:disabled {
      background: var(--surface2);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    #goLiveBtn.live {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    }

    /* ── Status Panel ────────────────────────────────────────────── */
    #statusPanel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #statusPanel.visible { display: flex; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .status-label { color: var(--muted); }
    .status-value { font-weight: 600; font-variant-numeric: tabular-nums; }

    .platform-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .platform-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 700;
      color: white;
    }

    .platform-badge.tiktok   { background: var(--tiktok); }
    .platform-badge.youtube  { background: var(--youtube); }
    .platform-badge.facebook { background: var(--facebook); }

    /* ── Stats ───────────────────────────────────────────────────── */
    #statsText {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }

    /* ── Toast Notifications ─────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: all .3s;
      z-index: 100;
      white-space: nowrap;
      max-width: calc(100vw - 48px);
      text-align: center;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red);   }

    /* ── Spinner ─────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section label ───────────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 2px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-dot" id="logoDot"></div>
      StreamFusion
    </div>
    <div class="conn-badge" id="connBadge">Connecting…</div>
  </header>

  <!-- Camera -->
  <div class="camera-wrap" id="cameraWrap">
    <div class="cam-placeholder" id="camPlaceholder" onclick="startCamera()">
      <div class="icon">📷</div>
      <div>Tap to enable camera</div>
    </div>
    <video id="preview" autoplay muted playsinline style="display:none"></video>

    <div class="live-overlay" id="liveOverlay">
      <span class="live-label">● LIVE</span>
      <span id="timer">00:00</span>
    </div>

    <div class="cam-controls" id="camControls" style="display:none">
      <button class="cam-btn" id="flipBtn"  title="Flip camera">🔄</button>
      <button class="cam-btn" id="muteBtn"  title="Mute mic">🎙️</button>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content">

    <!-- Platforms -->
    <div class="section-label">Streaming Platforms</div>

    <!-- TikTok -->
    <div class="platform-card" id="card-tiktok">
      <div class="platform-header" onclick="toggleCard('tiktok')">
        <div class="platform-info">
          <div class="platform-icon tiktok">TT</div>
          <div>
            <div class="platform-name">TikTok</div>
            <div class="platform-status" id="status-tiktok">Off</div>
          </div>
        </div>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" id="toggle-tiktok" onchange="onToggle('tiktok', this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="platform-body" id="body-tiktok">
        <div class="input-group">
          <div class="input-label">RTMP Server URL</div>
          <input class="key-input" id="url-tiktok" type="url"
            placeholder="rtmp://push.tiktokv.com/live/"
            value="rtmp://push.tiktokv.com/live/"
            oninput="saveKeys()" />
        </div>
        <div class="input-group">
          <div class="input-label">Stream Key</div>
          <div class="input-row">
            <input class="key-input" id="key-tiktok" type="password"
              placeholder="Paste your TikTok stream key"
              oninput="saveKeys()" />
            <button class="reveal-btn" onclick="toggleReveal('key-tiktok', this)">👁</button>
          </div>
        </div>
      </div>
    </div>

    <!-- YouTube -->
    <div class="platform-card" id="card-youtube">
      <div class="platform-header" onclick="toggleCard('youtube')">
        <div class="platform-info">
          <div class="platform-icon youtube">YT</div>
          <div>
            <div class="platform-name">YouTube</div>
            <div class="platform-status" id="status-youtube">Off</div>
          </div>
        </div>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" id="toggle-youtube" onchange="onToggle('youtube', this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="platform-body" id="body-youtube">
        <div class="input-group">
          <div class="input-label">RTMP Server URL</div>
          <input class="key-input" id="url-youtube" type="url"
            placeholder="rtmp://a.rtmp.youtube.com/live2"
            value="rtmp://a.rtmp.youtube.com/live2"
            oninput="saveKeys()" />
        </div>
        <div class="input-group">
          <div class="input-label">Stream Key</div>
          <div class="input-row">
            <input class="key-input" id="key-youtube" type="password"
              placeholder="Paste your YouTube stream key"
              oninput="saveKeys()" />
            <button class="reveal-btn" onclick="toggleReveal('key-youtube', this)">👁</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Facebook -->
    <div class="platform-card" id="card-facebook">
      <div class="platform-header" onclick="toggleCard('facebook')">
        <div class="platform-info">
          <div class="platform-icon facebook">FB</div>
          <div>
            <div class="platform-name">Facebook</div>
            <div class="platform-status" id="status-facebook">Off</div>
          </div>
        </div>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" id="toggle-facebook" onchange="onToggle('facebook', this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="platform-body" id="body-facebook">
        <div class="input-group">
          <div class="input-label">RTMP Server URL</div>
          <input class="key-input" id="url-facebook" type="url"
            placeholder="rtmps://live-api-s.facebook.com:443/rtmp/"
            value="rtmps://live-api-s.facebook.com:443/rtmp/"
            oninput="saveKeys()" />
        </div>
        <div class="input-group">
          <div class="input-label">Stream Key</div>
          <div class="input-row">
            <input class="key-input" id="key-facebook" type="password"
              placeholder="Paste your Facebook stream key"
              oninput="saveKeys()" />
            <button class="reveal-btn" onclick="toggleReveal('key-facebook', this)">👁</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Go Live -->
    <div class="go-live-wrap">
      <button id="goLiveBtn" onclick="handleGoLive()" disabled>
        Start Camera First
      </button>
    </div>

    <!-- Status Panel -->
    <div id="statusPanel">
      <div class="status-row">
        <span class="status-label">Streaming to</span>
        <div class="platform-badges" id="liveBadges"></div>
      </div>
      <div class="status-row">
        <span class="status-label">Duration</span>
        <span class="status-value" id="statusTimer">00:00</span>
      </div>
      <div id="statsText"></div>
    </div>

  </div><!-- /content -->

</div><!-- /app -->

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────

const PLATFORMS = ['tiktok', 'youtube', 'facebook'];
const STORAGE_KEY = 'sf_keys_v1';

// ── State ────────────────────────────────────────────────────────────────────

let ws            = null;
let mediaStream   = null;
let recorder      = null;
let isLive        = false;
let isMuted       = false;
let facingMode    = 'user';       // 'user' (front) or 'environment' (back)
let timerInterval = null;
let timerSeconds  = 0;
let wsReconnectTimer = null;
let reconnectAttempts = 0;
const MAX_RECONNECTS = 5;

// ── WebSocket ────────────────────────────────────────────────────────────────

function wsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${location.host}`;
}

function connectWs() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

  ws = new WebSocket(wsUrl());

  ws.onopen = () => {
    console.log('[WS] Connected');
    reconnectAttempts = 0;
    setBadge('connected', 'Connected');
    ws.send(JSON.stringify({ type: 'status' }));
  };

  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }

    switch (msg.type) {
      case 'started':
        onStreamStarted(msg);
        break;
      case 'stopped':
        onStreamStopped(msg);
        break;
      case 'error':
        onStreamError(msg);
        break;
      case 'stats':
        updateStats(msg.raw);
        break;
      case 'status':
        // Server told us current state on connect
        if (msg.streaming) toast('A stream is already active on the server.', 'error');
        break;
    }
  };

  ws.onclose = () => {
    c
